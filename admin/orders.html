<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pedidos | Pet Palace Admin</title>
    
    <link rel="stylesheet" href="../css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,500,700" rel="stylesheet">

    <style>
        /* ESTILOS GENERALES (Mismo tema que Clients) */
        body { font-family: 'Montserrat', sans-serif; font-size: 14px; background-color: #f4f6f9; color: #495057; }

        /* SIDEBAR */
        #sidebar {
            position: fixed; top: 0; bottom: 0; left: 0; z-index: 1000;
            padding-top: 25px; background-color: #15161D;
            width: 240px; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .sidebar-brand { text-align: center; margin-bottom: 35px; }
        .sidebar-brand img { width: 60px; margin-bottom: 10px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); padding: 2px; }
        .sidebar-brand h5 { color: #fff; letter-spacing: 1px; font-weight: 700; font-size: 16px; margin: 0; }
        .sidebar-brand p { color: #6c757d; font-size: 11px; text-transform: uppercase; margin-top: 5px; letter-spacing: 0.5px; }

        .nav-sidebar { list-style: none; padding: 0; margin: 0; }
        .nav-sidebar li a {
            display: flex; align-items: center; padding: 14px 25px;
            color: #aeb4be; text-decoration: none; font-weight: 500; font-size: 13px;
            transition: all 0.2s ease-in-out; border-left: 4px solid transparent;
        }
        .nav-sidebar li a i { width: 25px; font-size: 16px; margin-right: 10px; text-align: center; }
        .nav-sidebar li a:hover, .nav-sidebar li.active a {
            background-color: #1e2029; color: #fff; border-left-color: #D10024;
        }
        .nav-sidebar hr { border-color: #2c2e3e; margin: 20px 25px; opacity: 0.5; }

        /* CONTENIDO PRINCIPAL */
        main { margin-left: 240px; padding: 30px; transition: all 0.3s; }

        /* HEADER */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .top-bar h2 { margin: 0; font-weight: 800; color: #15161D; font-size: 24px; }

        /* CARD BLANCA */
        .card-custom {
            background: white; border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);
            overflow: hidden; margin-bottom: 25px;
        }
        .card-body-custom { padding: 20px; }

        /* FILTROS */
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 15px; top: 12px; color: #aaa; }
        .search-box input { padding-left: 40px; border-radius: 8px; border: 1px solid #e0e0e0; height: 40px; }
        .filter-select { border-radius: 8px; border: 1px solid #e0e0e0; height: 40px; }

        /* TABLA DE PEDIDOS */
        .table thead th { 
            background-color: #f8f9fa; color: #495057; border-bottom: 2px solid #e9ecef; 
            font-weight: 700; text-transform: uppercase; font-size: 11px; padding: 15px; 
        }
        .table tbody td { vertical-align: middle; padding: 15px; border-top: 1px solid #f0f0f0; }

        /* BADGES DE ESTADO (Colores Modernos) */
        .badge-status { font-size: 11px; padding: 6px 12px; border-radius: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .bg-pendiente { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .bg-enviado { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .bg-entregado { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .bg-cancelado { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* BOTONES DE ACCIÓN */
        .btn-action { 
            width: 32px; height: 32px; border-radius: 8px; border: none; 
            display: inline-flex; align-items: center; justify-content: center; 
            margin: 0 2px; transition: 0.2s; color: white;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-edit { background: #4ea3f1; }
        .btn-delete { background: #ff4b5c; }
        
        .btn-add { background: #6610f2; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; color: white; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background: #520dc2; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(102,16,242,0.3); color: white; text-decoration: none; }

        /* ANIMACIONES */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>

    <nav id="sidebar">
        <div class="sidebar-brand">
            <img src="../img/logo6.png" alt="Logo">
            <h5>Pet Palace</h5>
            <p id="rolDisplay">Verificando...</p>
        </div>
        <ul class="nav-sidebar">
            <li><a href="admin-panel.html"><i class="fa fa-chart-line"></i> Dashboard</a></li>
            <li id="menu-clients"><a href="clients.html"><i class="fa fa-users"></i> Clientes</a></li>
            <li><a href="products.html"><i class="fa fa-box-open"></i> Inventario</a></li>
            <li class="active"><a href="#"><i class="fa fa-shopping-bag"></i> Pedidos</a></li>
            <hr>
            <li><a href="../index.html"><i class="fa fa-store"></i> Ver Tienda</a></li>
            <li><a href="#" onclick="cerrarSesion()"><i class="fa fa-sign-out-alt"></i> Cerrar Sesión</a></li>
        </ul>
    </nav>

    <main>
        
        <div class="top-bar fade-in">
            <div>
                <h2 class="fw-bold m-0" style="color: #15161D;">Gestión de Pedidos</h2>
                <small class="text-muted">Administra las ventas y envíos</small>
            </div>
            <button class="btn btn-add shadow-sm" onclick="openAddModal()">
                <i class="fa fa-plus-circle"></i> Nuevo Pedido
            </button>
        </div>

        <div class="card-custom fade-in">
            <div class="card-body-custom">
                <div class="row">
                    <div class="col-md-8 mb-2">
                        <div class="search-box">
                            <i class="fa fa-search"></i>
                            <input type="text" id="filterSearch" class="form-control" placeholder="Buscar por Cliente, Producto o ID..." onkeyup="filterTable()">
                        </div>
                    </div>
                    <div class="col-md-4 mb-2">
                        <select id="filterStatus" class="form-control filter-select" onchange="filterTable()">
                            <option value="">Todos los Estados</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Enviado">Enviado</option>
                            <option value="Entregado">Entregado</option>
                            <option value="Cancelado">Cancelado</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-custom fade-in">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Total</th>
                            <th>Fecha</th>
                            <th class="text-center">Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr><td colspan="7" class="text-center py-5"><i class="fa fa-spinner fa-spin text-primary"></i> Cargando pedidos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <div class="modal fade" id="orderModal" role="dialog">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: 12px; border:none;">
                <form id="orderForm">
                    <div class="modal-header text-white" style="background: linear-gradient(135deg, #6610f2, #5e72e4); border-radius: 12px 12px 0 0;">
                        <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                        <h4 class="modal-title" id="modalTitle"><i class="fa fa-shopping-cart"></i> Pedido</h4>
                    </div>
                    
                    <div class="modal-body" style="background: #f8f9fa; padding: 25px;">
                        <input type="hidden" id="orderId">
                        
                        <div class="form-group">
                            <label class="font-weight-bold text-dark">Cliente</label>
                            <input type="text" class="form-control" id="orderClient" required placeholder="Nombre del cliente" style="border-radius:8px;">
                        </div>
                        
                        <div class="row">
                            <div class="col-xs-8 form-group">
                                <label class="font-weight-bold text-dark">Producto</label>
                                <input type="text" class="form-control" id="orderProduct" required style="border-radius:8px;">
                            </div>
                            <div class="col-xs-4 form-group">
                                <label class="font-weight-bold text-dark">Cant.</label>
                                <input type="number" class="form-control" id="orderQty" required min="1" value="1" style="border-radius:8px;">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-xs-6 form-group">
                                <label class="font-weight-bold text-dark">Total ($)</label>
                                <input type="number" class="form-control" id="orderTotal" required step="0.01" style="border-radius:8px;">
                            </div>
                            <div class="col-xs-6 form-group">
                                <label class="font-weight-bold text-dark">Estado</label>
                                <select class="form-control" id="orderStatus" style="border-radius:8px;">
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="Enviado">Enviado</option>
                                    <option value="Entregado">Entregado</option>
                                    <option value="Cancelado">Cancelado</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="font-weight-bold text-dark">Dirección de Envío</label>
                            <textarea class="form-control" id="orderAddress" rows="2" placeholder="Calle, Número, Colonia..." style="border-radius:8px;"></textarea>
                        </div>
                    </div>

                    <div class="modal-footer" style="border-top: 1px solid #eee;">
                        <button type="button" class="btn btn-link text-secondary" data-dismiss="modal">Cerrar</button>
                        <button type="submit" class="btn btn-primary" style="background: #6610f2; border:none; border-radius:8px; padding: 8px 20px;">Guardar Pedido</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/jquery.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>

    <script>
        const API_URL = '../api/orders.php';
        let ordersData = [];
        let userRole = '';
        let isEditing = false;

        $(document).ready(function() {
            verificarPermisos(); 
            loadOrders();        
        });

        function verificarPermisos() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { window.location.href = '../login.html'; return; }
            userRole = user.rol; 
            $('#rolDisplay').text(userRole === 'admin' ? 'Administrador' : 'Vendedor Autorizado');
        }

        function loadOrders() {
            const $tbody = $('#ordersTableBody');
            $.getJSON(API_URL, function(data) {
                ordersData = data;
                renderTable(data);
            }).fail(function() {
                $tbody.html('<tr><td colspan="7" class="text-center text-danger">Error de conexión</td></tr>');
            });
        }

        function renderTable(data) {
            const $tbody = $('#ordersTableBody');
            $tbody.empty();
            
            if(data.length === 0) {
                $tbody.html('<tr><td colspan="7" class="text-center text-muted p-5">No hay pedidos registrados.</td></tr>');
                return;
            }

            data.forEach(o => {
                let badgeClass = '';
                switch(o.estado) {
                    case 'Pendiente': badgeClass = 'bg-pendiente'; break;
                    case 'Enviado': badgeClass = 'bg-enviado'; break;
                    case 'Entregado': badgeClass = 'bg-entregado'; break;
                    case 'Cancelado': badgeClass = 'bg-cancelado'; break;
                }

                // Permisos de botones
                let actions = `<button class="btn-action btn-edit" onclick="openEditModal(${o.id})" title="Gestionar"><i class="fa fa-edit"></i></button>`;
                
                if (userRole === 'admin') {
                    actions += ` <button class="btn-action btn-delete" onclick="deleteOrder(${o.id})" title="Eliminar"><i class="fa fa-trash-alt"></i></button>`;
                }

                const row = `<tr>
                    <td class="font-weight-bold">#${o.id}</td>
                    <td><span class="d-block font-weight-bold text-dark">${o.cliente}</span></td>
                    <td>${o.producto} <span class="text-muted small">x${o.cantidad}</span></td>
                    <td class="font-weight-bold text-primary">$${parseFloat(o.total).toFixed(2)}</td>
                    <td><small class="text-muted">${o.fecha}</small></td>
                    <td class="text-center"><span class="badge-status ${badgeClass}">${o.estado}</span></td>
                    <td class="text-center">${actions}</td>
                </tr>`;
                $tbody.append(row);
            });
        }

        function filterTable() {
            const search = $('#filterSearch').val().toLowerCase();
            const status = $('#filterStatus').val();

            const filtered = ordersData.filter(o => {
                const matchesSearch = o.cliente.toLowerCase().includes(search) || 
                                      o.producto.toLowerCase().includes(search) || 
                                      o.id.toString().includes(search);
                const matchesStatus = status === "" || o.estado === status;
                return matchesSearch && matchesStatus;
            });
            renderTable(filtered);
        }

        function openAddModal() {
            isEditing = false;
            $('#orderForm')[0].reset();
            $('#orderId').val('');
            $('#orderStatus').val('Pendiente');
            $('#modalTitle').html('<i class="fa fa-plus-circle"></i> Nuevo Pedido');
            $('#orderModal').modal('show');
        }

        function openEditModal(id) {
            isEditing = true;
            const o = ordersData.find(item => parseInt(item.id) === id);
            if(!o) return;

            $('#orderId').val(o.id);
            $('#orderClient').val(o.cliente);
            $('#orderProduct').val(o.producto);
            $('#orderQty').val(o.cantidad);
            $('#orderTotal').val(o.total);
            $('#orderStatus').val(o.estado);
            $('#orderAddress').val(o.direccion || '');
            
            $('#modalTitle').html('<i class="fa fa-edit"></i> Gestionar Pedido #' + o.id);
            $('#orderModal').modal('show');
        }

        $('#orderForm').on('submit', function(e) {
            e.preventDefault();
            
            const data = {
                id: $('#orderId').val(),
                cliente: $('#orderClient').val(),
                producto: $('#orderProduct').val(),
                cantidad: $('#orderQty').val(),
                total: $('#orderTotal').val(),
                estado: $('#orderStatus').val(),
                direccion: $('#orderAddress').val(),
                fecha: new Date().toISOString().split('T')[0]
            };

            const method = isEditing ? 'PUT' : 'POST';

            $.ajax({
                url: API_URL, type: method, contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(res) {
                    if(res.status === 'success') {
                        $('#orderModal').modal('hide');
                        loadOrders(); 
                    }
                }
            });
        });

        function deleteOrder(id) {
            if (userRole !== 'admin') return;
            if(!confirm('¿Eliminar este pedido permanentemente?')) return;
            
            $.ajax({
                url: API_URL, type: 'DELETE', contentType: 'application/json',
                data: JSON.stringify({ id: id }),
                success: () => loadOrders()
            });
        }

        function cerrarSesion() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
