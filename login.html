<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso | Pet Palace</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card-custom {
      background-color: white;
      border-radius: 1rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    .logo-img { width: 80px; margin-bottom: 1rem; }
    .hidden { display: none; }
    
    /* Mensajes de alerta */
    #error-msg {
        display: none;
        color: #721c24;
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        padding: 10px;
        border-radius: 5px;
        font-size: 0.9rem;
        text-align: center;
        margin-top: 15px;
        font-weight: bold;
    }
    #success-msg {
        display: none;
        color: #155724;
        background-color: #d4edda;
        border: 1px solid #c3e6cb;
        padding: 10px;
        border-radius: 5px;
        font-size: 0.9rem;
        text-align: center;
        margin-top: 15px;
    }
    a { text-decoration: none; cursor: pointer; }
  </style>
</head>

<body>

  <div class="card-custom">
    <div class="text-center mb-4">
      <img src="img/logo6.png" alt="Logo Pet Palace" class="logo-img">
      <h3 id="formTitle">Iniciar Sesión</h3>
    </div>

    <form id="loginForm">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="loginEmail" placeholder="Correo" required>
        <label><i class="fa fa-envelope"></i> Correo Electrónico</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="loginPass" placeholder="Contraseña" required>
        <label><i class="fa fa-lock"></i> Contraseña</label>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
      
      <div class="text-center mt-3">
        <span>¿No tienes cuenta? </span>
        <a class="text-primary fw-bold" onclick="toggleForms()">Regístrate aquí</a>
      </div>
    </form>

    <form id="registerForm" class="hidden">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="regName" placeholder="Nombre Completo" required>
        <label><i class="fa fa-user"></i> Nombre Completo</label>
      </div>
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="regEmail" placeholder="Correo" required>
        <label><i class="fa fa-envelope"></i> Correo Electrónico</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="regPass" placeholder="Contraseña" required>
        <label><i class="fa fa-lock"></i> Contraseña</label>
      </div>
      <button type="submit" class="btn btn-success w-100">Crear Cuenta</button>
      
      <div class="text-center mt-3">
        <span>¿Ya tienes cuenta? </span>
        <a class="text-success fw-bold" onclick="toggleForms()">Inicia Sesión</a>
      </div>
    </form>

    <div id="error-msg"></div>
    <div id="success-msg"></div>
    
    <div class="text-center mt-3">
        <button class="btn btn-link text-secondary" onclick="window.location.href='index.html'">
            <i class="fa fa-arrow-left"></i> Volver a la tienda
        </button>
    </div>
  </div>

  <script>
    // 1. CAMBIAR VISTAS
    function toggleForms() {
        const loginForm = document.getElementById('loginForm');
        const regForm = document.getElementById('registerForm');
        const title = document.getElementById('formTitle');
        const error = document.getElementById('error-msg');
        const success = document.getElementById('success-msg');

        error.style.display = 'none';
        success.style.display = 'none';

        if (loginForm.classList.contains('hidden')) {
            loginForm.classList.remove('hidden');
            regForm.classList.add('hidden');
            title.innerText = "Iniciar Sesión";
        } else {
            loginForm.classList.add('hidden');
            regForm.classList.remove('hidden');
            title.innerText = "Crear Cuenta";
        }
    }

    // 2. LÓGICA DE LOGIN
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const correo = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPass').value.trim();
        const errorMsg = document.getElementById('error-msg');

        errorMsg.style.display = 'none';

        try {
            const response = await fetch('api/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ correo, password })
            });

            if (!response.ok) throw new Error("Error de conexión");

            const data = await response.json();

            if (data.status === 'success') {
                // --- EXITO ---
                localStorage.setItem('currentUser', JSON.stringify({
                    id: data.data.id,
                    nombre: data.data.nombre,
                    rol: data.data.rol,
                    correo: correo
                }));

                if (data.data.rol === 'admin') {
                    window.location.href = "admin/admin-panel.html";
                } else {
                    window.location.href = "index.html";
                }

            } else {
                // --- ERROR (Incluyendo suspensión) ---
                errorMsg.style.display = 'block';
                // AQUÍ ESTÁ LA MAGIA: Mostramos el mensaje exacto que manda PHP
                errorMsg.innerText = data.message; 
            }

        } catch (error) {
            console.error("Error técnico:", error);
            errorMsg.style.display = 'block';
            errorMsg.innerText = "Error de conexión. Revisa que XAMPP esté encendido.";
        }
    });

    // 3. LÓGICA DE REGISTRO
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const nombre = document.getElementById('regName').value.trim();
        const correo = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value.trim();
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        try {
            const response = await fetch('api/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, correo, password })
            });

            const data = await response.json();

            if (data.status === 'success') {
                successMsg.style.display = 'block';
                successMsg.innerText = "¡Cuenta creada! Redirigiendo...";
                setTimeout(() => {
                    toggleForms();
                    document.getElementById('loginEmail').value = correo;
                    document.getElementById('loginPass').focus();
                    successMsg.style.display = 'none';
                }, 1500);
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = data.message;
            }

        } catch (error) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = "Error al conectar con la base de datos.";
        }
    });
  </script>

</body>
</html>
